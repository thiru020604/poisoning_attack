<script language="javascript">
function validate()
{
	if(document.form1.name.value=="")
	{
	alert("Enter the Name");
	document.form1.name.focus();
	return false;
	}
	if(document.form1.aadhar.value=="")
	{
	alert("Enter the Aadhar");
	document.form1.aadhar.focus();
	return false;
	}
	if(isNaN(document.form1.aadhar.value))
	{
	alert("Invalid Aadhar No.");
	document.form1.aadhar.select();
	return false;
	}
	if(document.form1.aadhar.value.length!=12)
	{
	alert("Aadhar No. must be 12 digits!");
	document.form1.aadhar.select();
	return false;
	}
	if(document.form1.mobile.value=="")
	{
	alert("Enter the Mobile No.");
	document.form1.mobile.focus();
	return false;
	}
	if(isNaN(document.form1.mobile.value))
	{
	alert("Invalid Mobile No.");
	document.form1.mobile.select();
	return false;
	}
	if(document.form1.mobile.value.length!=10)
	{
	alert("Mobile No. must be 10 digits!");
	document.form1.mobile.select();
	return false;
	}
	
	
return true;
}
</script>

	<script>
        function updateTextboxes() {
            let count = document.getElementById("numberInput").value;
            let container = document.getElementById("textboxContainer");

            // Clear previous textboxes
            container.innerHTML = "";

            // Add new textboxes
            for (let i = 0; i < count; i++) {
                let textbox = document.createElement("input");
                textbox.type = "text";
				textbox.name = "textboxes[]"; 
                textbox.placeholder = "Label " + (i + 1);
                textbox.style.display = "block";
                textbox.style.marginBottom = "5px";
                container.appendChild(textbox);
            }
        }
    </script>
