	<script>
        function updateTextboxes() {
            let count = document.getElementById("numberInput").value;
            let container = document.getElementById("textboxContainer");

            // Clear previous textboxes
            container.innerHTML = "";

            // Add new textboxes
            for (let i = 0; i < count; i++) {
                let textbox = document.createElement("input");
                textbox.type = "text";
				textbox.name = "textboxes[]"; 
                textbox.placeholder = "Label " + (i + 1);
                textbox.style.display = "block";
                textbox.style.marginBottom = "5px";
                container.appendChild(textbox);
            }
        }
    </script>
